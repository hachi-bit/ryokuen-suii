<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>緑園都市 簡易浸水シミュレーター</title>

  <!-- CesiumJS -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; }

    #cesiumContainer {
      width: 100%;
      height: 100%;
    }

    /* ── コントロールパネル ── */
    #panel {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 320px;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(12px);
      color: #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 1000;
      user-select: none;
    }

    #panel h1 {
      font-size: 16px;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    #panel .subtitle {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 16px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .water-level-display {
      font-size: 36px;
      font-weight: 800;
      color: #38bdf8;
      line-height: 1;
    }

    .water-level-display .unit {
      font-size: 14px;
      font-weight: 400;
      color: #64748b;
      margin-left: 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #1e3a5f, #0ea5e9, #38bdf8);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #38bdf8;
      border: 3px solid #0f172a;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
      cursor: pointer;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
    }

    .toggle-row span {
      font-size: 13px;
      color: #cbd5e1;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #334155;
      border-radius: 12px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #e2e8f0;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #0ea5e9;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    .preset-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .preset-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-btn:hover {
      border-color: #38bdf8;
      color: #38bdf8;
      background: rgba(56, 189, 248, 0.08);
    }

    #status {
      font-size: 11px;
      color: #64748b;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      line-height: 1.5;
    }

    #status .ok { color: #4ade80; }
    #status .warn { color: #fbbf24; }
    #status .err { color: #f87171; }

    /* ── カメラ情報パネル ── */
    #cameraPanel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 340px;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(12px);
      color: #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 1000;
      font-size: 12px;
      font-family: 'Consolas', 'SFMono-Regular', monospace;
    }

    #cameraPanel h2 {
      font-size: 13px;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 10px;
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    }

    .cam-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    }

    .cam-label {
      color: #94a3b8;
    }

    .cam-value {
      color: #e2e8f0;
      font-weight: 600;
    }

    .copy-btn {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      font-size: 12px;
      border: 1px solid #a78bfa;
      background: rgba(167, 139, 250, 0.1);
      color: #a78bfa;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    }

    .copy-btn:hover {
      background: rgba(167, 139, 250, 0.2);
    }

    .copy-btn.copied {
      border-color: #4ade80;
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }

    #cameraPanel .hint {
      margin-top: 8px;
      font-size: 10px;
      color: #64748b;
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      line-height: 1.4;
    }

    /* ── クレジット表示 ── */
    #credit {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.5);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 1000;
    }
  </style>
</head>
<body>

  <div id="cesiumContainer"></div>

  <!-- コントロールパネル -->
  <div id="panel">
    <h1>簡易浸水シミュレーター</h1>
    <div class="subtitle">緑園都市エリア ─ PLATEAU 3D都市モデル</div>

    <!-- 水位スライダー -->
    <div class="control-group">
      <label>浸水水位（標高）</label>
      <div class="water-level-display">
        <span id="waterValue">0.0</span><span class="unit">m</span>
      </div>
      <input type="range" id="waterSlider" min="0" max="100" value="0" step="0.5">
      <div class="preset-buttons">
        <button class="preset-btn" data-level="0">0m</button>
        <button class="preset-btn" data-level="10">10m</button>
        <button class="preset-btn" data-level="30">30m</button>
        <button class="preset-btn" data-level="50">50m</button>
        <button class="preset-btn" data-level="70">70m</button>
        <button class="preset-btn" data-level="100">100m</button>
      </div>
    </div>

    <!-- 水面表示トグル -->
    <div class="toggle-row">
      <span>水面を表示</span>
      <label class="toggle-switch">
        <input type="checkbox" id="waterToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- 建物表示トグル -->
    <div class="toggle-row">
      <span>建物モデルを表示</span>
      <label class="toggle-switch">
        <input type="checkbox" id="buildingToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- ステータス -->
    <div id="status">読み込み中...</div>
  </div>

  <!-- カメラ情報パネル（初期位置設定用） -->
  <div id="cameraPanel">
    <h2>📷 カメラ情報（初期位置設定用）</h2>
    <div class="cam-row"><span class="cam-label">経度 (lon)</span><span class="cam-value" id="camLon">-</span></div>
    <div class="cam-row"><span class="cam-label">緯度 (lat)</span><span class="cam-value" id="camLat">-</span></div>
    <div class="cam-row"><span class="cam-label">高度 (m)</span><span class="cam-value" id="camAlt">-</span></div>
    <div class="cam-row"><span class="cam-label">向き heading (°)</span><span class="cam-value" id="camHead">-</span></div>
    <div class="cam-row"><span class="cam-label">仰角 pitch (°)</span><span class="cam-value" id="camPitch">-</span></div>
    <div class="cam-row"><span class="cam-label">回転 roll (°)</span><span class="cam-value" id="camRoll">-</span></div>
    <button class="copy-btn" id="copyBtn">📋 初期位置コードとしてコピー</button>
    <div class="hint">
      好みのアングルに移動してからコピーボタンを押すと、<br>
      コード冒頭の設定に貼り付けられる形式でコピーされます。
    </div>
  </div>

  <!-- クレジット表記 -->
  <div id="credit">
    3D都市モデル（国土交通省）を加工して作成 ｜
    地理院タイル（国土地理院） ｜
    地形データは、測量法に基づく国土地理院長承認（使用）R3JHs 778を得て使用
  </div>

  <script>
    // ============================================================
    //  設定（必要に応じてここを変更してください）
    // ============================================================

    // PLATEAU配信サービスの共有トークン（公式チュートリアル掲載のもの）
    const PLATEAU_ION_TOKEN =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.' +
      'eyJqdGkiOiJlNjk0MTM4NC1lMWI0LTQxNTgtYjcxZS01ZWJhMGJlMTE1MWQiLCJpZCI6MTQ5ODk3LCJpYXQiOjE3MTUxNTEyODZ9.' +
      '2aUmEQ2-fDsjf-XeC6-hZpwkgwLse3yXoXF4xTOvPAY';

    // 地形データのアセットID（PLATEAU-Terrain）
    const TERRAIN_ASSET_ID = 2488101;

    // ── 初期カメラ位置 ──
    // ※ カメラ情報パネルでコピーした値をここに貼り付けてください
    const INITIAL_CAMERA = {
      lon: 139.5116,      // 経度
      lat: 35.4076,       // 緯度
      height: 1200,       // 高度 (m)
      heading: 0,         // 向き (°)
      pitch: -45,         // 仰角 (°)
      roll: 0,            // 回転 (°)
    };

    // ── デフォルト水位 (m) ──
    const DEFAULT_WATER_LEVEL = 0;

    // 水位スライダーの最大値 (m)
    const MAX_WATER_LEVEL = 100;

    // 水面ポリゴンの範囲（緑園都市周辺をカバーする矩形）
    const WATER_BOUNDS = {
      west:  139.48,
      south: 35.38,
      east:  139.54,
      north: 35.44,
    };

    // 建物データURL（PLATEAU配信サービス）
    const BUILDING_URLS = [
      'https://api.plateauview.mlit.go.jp/datacatalog/3dtiles/14116-bldg-lod1-texture-2024/tileset.json',
    ];

    // ============================================================
    //  メイン処理
    // ============================================================

    Cesium.Ion.defaultAccessToken = PLATEAU_ION_TOKEN;

    const statusEl = document.getElementById('status');
    function setStatus(html) { statusEl.innerHTML = html; }

    (async () => {
      try {
        // ── 1. Viewer作成 ──
        setStatus('Viewerを初期化中...');

        const viewer = new Cesium.Viewer('cesiumContainer', {
          // 地理院タイル（航空写真）
          imageryProvider: new Cesium.UrlTemplateImageryProvider({
            url: 'https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',
            maximumLevel: 18,
            credit: '地理院タイル',
          }),
          terrainProvider: await Cesium.CesiumTerrainProvider.fromIonAssetId(TERRAIN_ASSET_ID),
          animation: false,
          timeline: false,
          homeButton: false,
          geocoder: false,
          sceneModePicker: false,
          baseLayerPicker: false,
          navigationHelpButton: false,
          fullscreenButton: false,
          selectionIndicator: false,
          infoBox: false,
        });

        viewer.scene.globe.depthTestAgainstTerrain = true;

        // 地形に陰影をつけて凹凸を見やすくする
        viewer.scene.globe.enableLighting = true;

        // 地形の高低差を強調（1.0=等倍、大きいほど凹凸が目立つ）
        viewer.scene.verticalExaggeration = 1.5;

        setStatus('<span class="ok">✓</span> Viewer初期化完了');

        // ── 2. 建物の水没表現用シェーダー ──
        const buildingShader = new Cesium.CustomShader({
          uniforms: {
            u_waterLevel: {
              type: Cesium.UniformType.FLOAT,
              value: DEFAULT_WATER_LEVEL,
            },
          },
          // 建物の各ピクセルの標高を計算し、水位より低い部分を赤くする
          fragmentShaderText: `
            void fragmentMain(FragmentInput fsInput, inout czm_modelMaterial material) {
              // ECEF座標から楕円体高を計算（Bowring法）
              vec3 p_wc = fsInput.attributes.positionWC;
              float a = 6378137.0;
              float b = 6356752.3142;
              float e2 = 1.0 - (b * b) / (a * a);

              float p_xy = sqrt(p_wc.x * p_wc.x + p_wc.y * p_wc.y);
              float theta = atan(p_wc.z * a, p_xy * b);
              float sinT = sin(theta);
              float cosT = cos(theta);

              float lat = atan(
                p_wc.z + (a * a - b * b) / b * sinT * sinT * sinT,
                p_xy - e2 * a * cosT * cosT * cosT
              );

              float sinLat = sin(lat);
              float N = a / sqrt(1.0 - e2 * sinLat * sinLat);
              float h = p_xy / cos(lat) - N;

              // 水位以下の部分を赤く染める
              if (u_waterLevel > 0.0 && h < u_waterLevel) {
                float depth = clamp((u_waterLevel - h) / 5.0, 0.0, 1.0);
                material.diffuse = mix(material.diffuse, vec3(0.9, 0.1, 0.05), depth * 0.8);
              }
            }
          `,
        });

        // ── 3. 建物データ読み込み ──
        let tileset = null;
        let buildingLoaded = false;

        for (const url of BUILDING_URLS) {
          try {
            setStatus(`建物データを読み込み中...<br><span style="font-size:10px;color:#475569">${url.split('/').slice(-3).join('/')}</span>`);
            tileset = await Cesium.Cesium3DTileset.fromUrl(url);
            tileset.customShader = buildingShader;
            viewer.scene.primitives.add(tileset);
            buildingLoaded = true;
            setStatus('<span class="ok">✓</span> 建物データ読み込み完了');
            break;
          } catch (e) {
            console.warn('建物データ読み込み失敗:', url, e.message);
          }
        }

        if (!buildingLoaded) {
          setStatus(
            '<span class="warn">⚠</span> 建物データのURLが見つかりませんでした。<br>' +
            '<a href="https://docs.plateauview.mlit.go.jp/datasets/explorer/" target="_blank" ' +
            'style="color:#38bdf8;text-decoration:underline;">PLATEAU配信サービス</a> で' +
            '横浜市泉区の建築物モデルURLを検索し、<br>コード冒頭の BUILDING_URLS を差し替えてください。'
          );
        }

        // ── 3. カメラを初期位置へ移動 ──
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(
            INITIAL_CAMERA.lon,
            INITIAL_CAMERA.lat,
            INITIAL_CAMERA.height
          ),
          orientation: {
            heading: Cesium.Math.toRadians(INITIAL_CAMERA.heading),
            pitch: Cesium.Math.toRadians(INITIAL_CAMERA.pitch),
            roll: Cesium.Math.toRadians(INITIAL_CAMERA.roll),
          },
          duration: 2,
        });

        // ── 4. 水面エンティティの作成 ──
        const waterEntity = viewer.entities.add({
          polygon: {
            hierarchy: Cesium.Cartesian3.fromDegreesArray([
              WATER_BOUNDS.west, WATER_BOUNDS.south,
              WATER_BOUNDS.east, WATER_BOUNDS.south,
              WATER_BOUNDS.east, WATER_BOUNDS.north,
              WATER_BOUNDS.west, WATER_BOUNDS.north,
            ]),
            height: DEFAULT_WATER_LEVEL,
            material: new Cesium.Color(0.1, 0.4, 0.9, 0.3),
            outline: false,
          },
          show: DEFAULT_WATER_LEVEL > 0,
        });

        // ── 5. UIイベント ──

        const slider = document.getElementById('waterSlider');
        const valueDisplay = document.getElementById('waterValue');

        function updateWaterLevel(level) {
          valueDisplay.textContent = level.toFixed(1);
          waterEntity.polygon.height = level;
          // 水位0なら水面を非表示
          waterEntity.show = level > 0 && document.getElementById('waterToggle').checked;
          // 水面は常に青（水位が高いほど少し濃くなる程度）
          const ratio = Math.min(level / MAX_WATER_LEVEL, 1);
          waterEntity.polygon.material = new Cesium.Color(0.1, 0.3, 0.8, 0.3 + ratio * 0.1);
          // 建物シェーダーの水位も更新
          buildingShader.setUniform('u_waterLevel', level);
        }

        // デフォルト水位を適用
        slider.value = DEFAULT_WATER_LEVEL;
        updateWaterLevel(DEFAULT_WATER_LEVEL);

        slider.addEventListener('input', (e) => {
          updateWaterLevel(parseFloat(e.target.value));
        });

        document.querySelectorAll('.preset-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const level = parseFloat(btn.dataset.level);
            slider.value = level;
            updateWaterLevel(level);
          });
        });

        document.getElementById('waterToggle').addEventListener('change', (e) => {
          const level = parseFloat(slider.value);
          waterEntity.show = e.target.checked && level > 0;
        });

        document.getElementById('buildingToggle').addEventListener('change', (e) => {
          if (tileset) tileset.show = e.target.checked;
        });

        // ── 6. カメラ情報のリアルタイム表示 ──
        const camLon   = document.getElementById('camLon');
        const camLat   = document.getElementById('camLat');
        const camAlt   = document.getElementById('camAlt');
        const camHead  = document.getElementById('camHead');
        const camPitch = document.getElementById('camPitch');
        const camRoll  = document.getElementById('camRoll');

        function getCameraInfo() {
          const pos = viewer.camera.positionCartographic;
          return {
            lon:     Cesium.Math.toDegrees(pos.longitude),
            lat:     Cesium.Math.toDegrees(pos.latitude),
            height:  pos.height,
            heading: Cesium.Math.toDegrees(viewer.camera.heading),
            pitch:   Cesium.Math.toDegrees(viewer.camera.pitch),
            roll:    Cesium.Math.toDegrees(viewer.camera.roll),
          };
        }

        // カメラ移動のたびに更新
        viewer.camera.changed.addEventListener(() => {
          const info = getCameraInfo();
          camLon.textContent   = info.lon.toFixed(6);
          camLat.textContent   = info.lat.toFixed(6);
          camAlt.textContent   = info.height.toFixed(1);
          camHead.textContent  = info.heading.toFixed(2);
          camPitch.textContent = info.pitch.toFixed(2);
          camRoll.textContent  = info.roll.toFixed(2);
        });
        // 感度を上げる（少しの動きでも更新）
        viewer.camera.percentageChanged = 0.001;

        // コピーボタン
        document.getElementById('copyBtn').addEventListener('click', () => {
          const info = getCameraInfo();
          const code =
`const INITIAL_CAMERA = {
  lon: ${info.lon.toFixed(6)},
  lat: ${info.lat.toFixed(6)},
  height: ${info.height.toFixed(1)},
  heading: ${info.heading.toFixed(2)},
  pitch: ${info.pitch.toFixed(2)},
  roll: ${info.roll.toFixed(2)},
};`;
          navigator.clipboard.writeText(code).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = '✅ コピーしました！';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.textContent = '📋 初期位置コードとしてコピー';
              btn.classList.remove('copied');
            }, 2000);
          });
        });

        // ステータス更新
        if (buildingLoaded) {
          setStatus(
            '<span class="ok">✓</span> 準備完了<br>' +
            'スライダーで水位を変更してください。<br>' +
            'マウスドラッグで回転、右ドラッグでズーム、ホイールで拡大縮小。'
          );
        }

      } catch (err) {
        console.error(err);
        setStatus(`<span class="err">✗ エラー:</span> ${err.message}`);
      }
    })();
  </script>
</body>
</html>
